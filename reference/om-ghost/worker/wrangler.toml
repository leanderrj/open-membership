name = "om-ghost"
main = "index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# The bundled om-config.yaml. Ship it with the Worker rather than loading
# it from KV because it's small, rarely changes, and is best versioned
# alongside code.
[build]
command = ""

# -----------------------------------------------------------------------
# KV namespaces.
#
# Create once with: wrangler kv namespace create <BINDING>
# Then replace the id values below with what wrangler prints.
# -----------------------------------------------------------------------

[[kv_namespaces]]
binding = "OM_FEED_CACHE"
id = "REPLACE_ME_FEED_CACHE"

[[kv_namespaces]]
binding = "OM_IDEMPOTENCY"
id = "REPLACE_ME_IDEMPOTENCY"

[[kv_namespaces]]
binding = "OM_RATE_LIMIT"
id = "REPLACE_ME_RATE_LIMIT"

# -----------------------------------------------------------------------
# Configuration vars (non-secret). Set secrets with `wrangler secret put`:
#   GHOST_ADMIN_KEY, GHOST_CONTENT_KEY, STRIPE_SECRET_KEY,
#   STRIPE_WEBHOOK_SECRET, OM_FEED_TOKEN_KEY, OM_JWT_SIGNING_KEY
# -----------------------------------------------------------------------

[vars]
PUBLIC_URL = "https://publisher.example"
GHOST_URL = "https://publisher.example"
LOG_LEVEL = "info"
OM_CORS_ORIGINS = ""

# The om-config.yaml file is pulled in via the build step. For now the
# deploy script reads ./om-config.yaml and inlines it. The Worker entry
# (index.ts) imports it as a module.

[[rules]]
type = "Text"
globs = ["**/*.yaml"]
fallthrough = false

# Explicit observability toggles. You may also enable the Workers logs
# product in the dashboard for per-request log retention.
[observability]
enabled = true
head_sampling_rate = 1
