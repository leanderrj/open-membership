name: Site issue
description: Report a problem with openmembership.org
title: "[site] "
labels: ["site"]
body:
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: "https://openmembership.org/..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is wrong?
      description: Broken link, rendering issue, accessibility problem, factual error.
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Only if the issue is rendering or accessibility related.
    validations:
      required: false
