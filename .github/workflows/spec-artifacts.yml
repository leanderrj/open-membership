name: Spec artefacts (IETF draft, PDF)

on:
  push:
    branches: [main]
    paths:
      - 'SPEC.md'
      - 'spec/**'
      - 'ietf/**'
      - 'site/**'
      - '.github/workflows/spec-artifacts.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: spec-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ietf-draft:
    name: IETF Internet-Draft (kramdown-rfc → xml2rfc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Set up Python (xml2rfc)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install kramdown-rfc and xml2rfc
        run: |
          gem install kramdown-rfc
          python -m pip install --upgrade pip
          pip install xml2rfc

      - name: Build draft (XML + text + html)
        working-directory: ietf
        run: |
          kramdown-rfc draft-om-rss-00.md > draft-om-rss-00.xml
          xml2rfc --text --html draft-om-rss-00.xml

      - name: Upload draft artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ietf-draft
          path: |
            ietf/draft-om-rss-00.xml
            ietf/draft-om-rss-00.txt
            ietf/draft-om-rss-00.html
          retention-days: 30

  spec-pdf:
    name: Spec PDF (rendered from /spec/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Install Playwright (Chromium)
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Render spec routes to PDF
        working-directory: site
        run: node scripts/render-pdfs.mjs

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: spec-pdfs
          path: site/dist/_pdf/*.pdf
          retention-days: 30
